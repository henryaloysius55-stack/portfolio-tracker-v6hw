<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Folio — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0c0e13;--bg-2:#11141c;--bg-3:#181c28;--border:rgba(255,255,255,0.07);--border-2:rgba(255,255,255,0.12);--text:#e9ebf2;--text-2:#9aa0b8;--text-3:#565d78;--accent:#f5b731;--accent-2:#f7c94a;--accent-bg:rgba(245,183,49,0.10);--green:#26d9a0;--green-bg:rgba(38,217,160,0.10);--red:#f0546a;--red-bg:rgba(240,84,106,0.10);--font-d:'Syne',sans-serif;--font-m:'DM Mono',monospace;--radius:14px;--radius-sm:8px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-m);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,183,49,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,183,49,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
    .container{width:100%;max-width:420px;position:relative;z-index:1}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
    .logo-mark{color:var(--accent);font-size:28px}
    .logo-text{font-family:var(--font-d);font-size:26px;font-weight:800;letter-spacing:-0.5px}
    .tagline{text-align:center;font-size:12px;color:var(--text-3);margin-bottom:28px}
    .card{background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:0 24px 60px rgba(0,0,0,0.4)}
    .tabs{display:flex;background:var(--bg-3);border-radius:var(--radius-sm);padding:4px;margin-bottom:26px}
    .tab{flex:1;padding:9px;border:none;border-radius:6px;background:transparent;color:var(--text-2);font-family:var(--font-m);font-size:13px;cursor:pointer;transition:all 0.15s;text-align:center}
    .tab.active{background:var(--bg-2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
    .form{display:flex;flex-direction:column;gap:15px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-2)}
    .form-input{background:var(--bg-3);border:1px solid var(--border-2);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-m);font-size:14px;padding:11px 13px;outline:none;width:100%;transition:border-color 0.15s,box-shadow 0.15s}
    .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
    .form-input::placeholder{color:var(--text-3)}
    .btn-submit{background:var(--accent);color:#0c0e13;font-family:var(--font-m);font-size:14px;font-weight:600;padding:13px;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;margin-top:4px;width:100%}
    .btn-submit:hover{background:var(--accent-2)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed}
    .msg{padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;display:none}
    .msg-error{background:var(--red-bg);border:1px solid var(--red);color:var(--red)}
    .msg-success{background:var(--green-bg);border:1px solid var(--green);color:var(--green)}
    .disclaimer{text-align:center;margin-top:22px;font-size:11px;color:var(--text-3);line-height:1.7}
    .disclaimer strong{color:var(--red)}
    .features{display:flex;justify-content:center;gap:20px;margin-bottom:24px;flex-wrap:wrap}
    .feature{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px}
    .feature span:first-child{font-size:14px}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span class="logo-mark">◈</span><span class="logo-text">Folio</span></div>
    <p class="tagline">Track · Analyze · Grow</p>

    <div class="features">
      <span class="feature"><span>📊</span> Live prices</span>
      <span class="feature"><span>🤖</span> AI Advisor</span>
      <span class="feature"><span>📰</span> Market news</span>
      <span class="feature"><span>👥</span> Copy trading</span>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
        <button class="tab"        id="tab-register" onclick="showTab('register')">Create Account</button>
      </div>

      <div id="form-login">
        <div class="form">
          <div class="form-group"><label class="form-label">Email</label><input type="email" id="login-email" class="form-input" placeholder="you@example.com" /></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" id="login-password" class="form-input" placeholder="••••••••" /></div>
          <div class="msg msg-error"   id="login-error"></div>
          <div class="msg msg-success" id="login-success"></div>
          <button class="btn-submit" id="login-btn" onclick="submitLogin()">Sign In →</button>
        </div>
      </div>

      <div id="form-register" style="display:none">
        <div class="form">
          <div class="form-group"><label class="form-label">Email</label><input type="email" id="reg-email" class="form-input" placeholder="you@example.com" /></div>
          <div class="form-group"><label class="form-label">Username</label><input type="text" id="reg-username" class="form-input" placeholder="e.g. investorjoe" /></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" id="reg-password" class="form-input" placeholder="Min. 6 characters" /></div>
          <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" id="reg-confirm" class="form-input" placeholder="Repeat password" /></div>
          <div class="msg msg-error"   id="reg-error"></div>
          <div class="msg msg-success" id="reg-success"></div>
          <button class="btn-submit" id="reg-btn" onclick="submitRegister()">Create Account →</button>
        </div>
      </div>
    </div>

    <p class="disclaimer">⚠ <strong>Not financial advice.</strong> Folio is for informational purposes only.<br>Always do your own research before making investment decisions.</p>
  </div>

  <script>
    const API = "https://folio-backend-ldny.onrender.com";
    if (localStorage.getItem("folio_token")) window.location.href = "index.html";

    function showTab(tab) {
      document.getElementById("form-login").style.display    = tab==="login"    ? "block":"none";
      document.getElementById("form-register").style.display = tab==="register" ? "block":"none";
      document.getElementById("tab-login").className    = `tab ${tab==="login"    ?"active":""}`;
      document.getElementById("tab-register").className = `tab ${tab==="register" ?"active":""}`;
    }

    async function submitLogin() {
      const email=document.getElementById("login-email").value.trim(),password=document.getElementById("login-password").value;
      const errEl=document.getElementById("login-error"),okEl=document.getElementById("login-success"),btn=document.getElementById("login-btn");
      errEl.style.display="none"; okEl.style.display="none";
      if(!email||!password){show(errEl,"Please fill in all fields.");return;}
      btn.disabled=true; btn.textContent="Signing in…";
      try {
        const res=await fetch(`${API}/auth/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
        const data=await res.json();
        if(!res.ok)throw new Error(data.detail||"Login failed");
        localStorage.setItem("folio_token",data.access_token);
        localStorage.setItem("folio_user",JSON.stringify(data.user));
        show(okEl,`✓ Welcome back, ${data.user.username}!`);
        setTimeout(()=>window.location.href="index.html",700);
      } catch(e){show(errEl,e.message);}
      finally{btn.disabled=false;btn.textContent="Sign In →";}
    }

    async function submitRegister() {
      const email=document.getElementById("reg-email").value.trim(),username=document.getElementById("reg-username").value.trim(),password=document.getElementById("reg-password").value,confirm=document.getElementById("reg-confirm").value;
      const errEl=document.getElementById("reg-error"),okEl=document.getElementById("reg-success"),btn=document.getElementById("reg-btn");
      errEl.style.display="none"; okEl.style.display="none";
      if(!email||!username||!password){show(errEl,"Please fill in all fields.");return;}
      if(password!==confirm){show(errEl,"Passwords do not match.");return;}
      if(password.length<6){show(errEl,"Password must be at least 6 characters.");return;}
      if(username.length<3){show(errEl,"Username must be at least 3 characters.");return;}
      btn.disabled=true; btn.textContent="Creating account…";
      try {
        const res=await fetch(`${API}/auth/register`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,username,password})});
        const data=await res.json();
        if(!res.ok)throw new Error(data.detail||"Registration failed");
        localStorage.setItem("folio_token",data.access_token);
        localStorage.setItem("folio_user",JSON.stringify(data.user));
        show(okEl,`✓ Welcome to Folio, ${data.user.username}!`);
        setTimeout(()=>window.location.href="index.html",700);
      } catch(e){show(errEl,e.message);}
      finally{btn.disabled=false;btn.textContent="Create Account →";}
    }

    function show(el,msg){el.textContent=msg;el.style.display="block";}
    document.addEventListener("keydown",e=>{if(e.key==="Enter"){const loginVisible=document.getElementById("form-login").style.display!=="none";if(loginVisible)submitLogin();else submitRegister();}});
  </script>
</body>
</html>
